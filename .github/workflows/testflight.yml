name: TestFlight

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]

concurrency:
  group: testflight-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  upload:
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       !contains(github.event.pull_request.labels.*.name, 'skip-testflight'))
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Verify environment
        run: |
          echo "::group::Xcode version"
          xcodebuild -version
          echo "::endgroup::"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Determine marketing version
        id: version
        run: |
          BASE=$(grep 'MARKETING_VERSION:' project.yml | awk '{print $2}')
          MAJOR=$(echo "$BASE" | cut -d. -f1)
          MINOR=$(echo "$BASE" | cut -d. -f2)
          echo "value=${MAJOR}.${MINOR}.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          DELIM="CHANGELOG_${RANDOM}${RANDOM}"
          {
            echo "notes<<${DELIM}"
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              SUMMARY=$(printf '%s\n' "$PR_BODY" | awk '/^## Summary$/{found=1;next} found && /^## /{exit} found{print}' | sed '/^$/d')
              if [ -n "$SUMMARY" ]; then
                echo "$SUMMARY"
              else
                printf '%s\n' "$PR_BODY" | head -20
              fi
            else
              git log --pretty=format:'- %s' HEAD~10..HEAD 2>/dev/null || git log --pretty=format:'- %s' --all
            fi
            echo ""
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"

      - name: Install signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.DISTRIBUTION_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/BigPigFarm.mobileprovision

      - name: Install App Store Connect API key
        env:
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEY_DIR"
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > "$KEY_DIR/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8"

      - name: Archive
        run: |
          xcodebuild archive \
            -scheme BigPigFarm \
            -configuration Internal \
            -archivePath "${{ runner.temp }}/BigPigFarm.xcarchive" \
            -destination 'generic/platform=iOS' \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            MARKETING_VERSION=${{ steps.version.outputs.value }} \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISIONING_PROFILE_NAME }}" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/".appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8" \
            -authenticationKeyID ${{ secrets.APP_STORE_CONNECT_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}

      - name: Export and upload to TestFlight
        run: |
          xcodebuild -exportArchive \
            -archivePath "${{ runner.temp }}/BigPigFarm.xcarchive" \
            -exportOptionsPlist exportOptions.plist \
            -exportPath "${{ runner.temp }}/export" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/".appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8" \
            -authenticationKeyID ${{ secrets.APP_STORE_CONNECT_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}

      - name: Set TestFlight "What to Test" notes
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          BUILD_NUMBER: ${{ github.run_number }}
          NOTES: |-
            Build ${{ steps.version.outputs.value }} (${{ github.run_number }})

            Changes:
            ${{ steps.changelog.outputs.notes }}

            Branch: ${{ github.head_ref || github.ref_name }}
            Commit: ${{ github.sha }}
        run: |
          pip3 install PyJWT cryptography --quiet --break-system-packages
          python3 scripts/set-testflight-notes.py

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const buildNumber = '${{ github.run_number }}';
            const version = '${{ steps.version.outputs.value }}';
            const existing = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = existing.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('TestFlight build')
            );
            const body = [
              `**TestFlight build ${version} (${buildNumber})** uploaded successfully.`,
              '',
              `Install via the TestFlight app — look for version **${version}**, build **${buildNumber}**.`,
            ].join('\n');
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Clean up signing materials
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/BigPigFarm.mobileprovision
          rm -f "$RUNNER_TEMP/certificate.p12"
          rm -rf ~/.appstoreconnect
