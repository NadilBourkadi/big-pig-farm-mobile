# SwiftLint configuration for Big Pig Farm
# Mirrors Python repo's ruff conventions where applicable

# Paths to include
included:
  - BigPigFarm
  - BigPigFarmTests

# Paths to exclude
excluded:
  - .build
  - DerivedData

# Rule configuration
line_length:
  warning: 120
  error: 150
  ignores_urls: true
  ignores_comments: false

file_length:
  warning: 300
  error: 500
  ignore_comment_only_lines: true

type_body_length:
  warning: 250
  error: 400

function_body_length:
  warning: 50
  error: 100

function_parameter_count:
  warning: 8
  error: 10

# Safety rules — error severity
force_unwrapping:
  severity: error

force_cast:
  severity: error

force_try:
  severity: error

# Disabled rules
disabled_rules:
  - todo  # Placeholder files use TODO: by design
  - trailing_comma  # Allow trailing commas in multi-line collections

# Opt-in rules
opt_in_rules:
  - force_unwrapping
  - implicit_return
  - first_where
  - last_where
  - sorted_first_last
  - redundant_type_annotation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - fatal_error_message
  - flatmap_over_map_reduce
  - identical_operands
  - joined_default_parameter
  - modifier_order
  - overridden_super_call
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - private_action
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - yoda_condition

# Identifier naming exceptions (match Python repo)
identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 60
    error: 80
  excluded:
    - id
    - x
    - y
    - dx
    - dy
    - i
    - j

# Nesting
nesting:
  type_level:
    warning: 2
  function_level:
    warning: 3

# Reporter
reporter: xcode
