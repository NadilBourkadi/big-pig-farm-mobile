name: BigPigFarm

options:
  bundleIdPrefix: com.nadilbourkadi
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: SB482MD97S

targets:
  BigPigFarm:
    type: application
    platform: iOS
    sources:
      - path: BigPigFarm
        excludes:
          - "**/.DS_Store"
    resources:
      - path: BigPigFarm/Resources/Assets.xcassets
      - path: BigPigFarm/PrivacyInfo.xcprivacy
    settings:
      base:
        INFOPLIST_KEY_CFBundleDisplayName: Big Pig Farm
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.simulation-games"
        INFOPLIST_KEY_UIRequiredDeviceCapabilities: arm64
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleLightContent
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        PRODUCT_BUNDLE_IDENTIFIER: com.nadilbourkadi.bigpigfarm
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_OPTIMIZATION: space
    postCompileScripts:
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        script: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint lint --quiet
          else
            echo "warning: SwiftLint not installed. Install via: brew install swiftlint"
          fi

  BigPigFarmTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BigPigFarmTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: BigPigFarm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nadilbourkadi.bigpigfarm.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/BigPigFarm.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/BigPigFarm"
        BUNDLE_LOADER: "$(TEST_HOST)"
